<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080808;height:100%;overflow:hidden;font-family:'Courier New',monospace}

#app{width:100%;height:100vh;display:flex;flex-direction:column;background:#080808}

#setup{
  position:fixed;inset:0;background:rgba(8,8,8,0.97);
  display:flex;align-items:center;justify-content:center;
  z-index:2000;padding:20px;overflow-y:auto;
}
.setup-box{border:1px solid #e8e4d9;padding:28px 32px;max-width:340px;width:100%}
.setup-box h2{color:#e8e4d9;font-family:Georgia,serif;font-size:18px;letter-spacing:2px;margin-bottom:4px;font-weight:400}
.setup-box .sub{color:#787468;font-size:10px;letter-spacing:3px;margin-bottom:24px}
.setup-box label{display:block;color:#b8b4a9;font-size:11px;margin-bottom:6px;letter-spacing:1px}
.setup-box input{
  width:100%;background:transparent;border:none;border-bottom:1px solid #444;
  color:#e8e4d9;font-family:'Courier New',monospace;
  font-size:15px;padding:6px 0;outline:none;margin-bottom:16px;
}
.room-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:6px}
.room-row input{margin-bottom:0;flex:1}
.btn-gen{
  background:transparent;border:1px solid #555;color:#b8b4a9;
  font-family:'Courier New',monospace;font-size:10px;padding:6px 10px;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.btn-gen:hover{border-color:#e8e4d9;color:#e8e4d9}
.room-hint{font-size:9px;color:#484440;margin-bottom:16px;letter-spacing:1px}
.pin-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:24px}
.pin-opt{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color 0.15s}
.pin-opt.selected{border-color:#e8e4d9}
.btn-enter{
  width:100%;background:transparent;border:1px solid #e8e4d9;
  color:#e8e4d9;font-family:'Courier New',monospace;
  font-size:13px;padding:10px;cursor:pointer;letter-spacing:2px;
}
.btn-enter:hover{background:rgba(232,228,217,0.08)}
.setup-err{color:#c0392b;font-size:11px;margin-bottom:10px;min-height:16px}

#toolbar{
  background:rgba(8,8,8,0.96);border-bottom:1px solid #222;
  padding:8px 14px;display:none;align-items:center;
  gap:8px;flex-wrap:wrap;flex-shrink:0;z-index:100;
}
.user-badge{display:flex;align-items:center;gap:6px;color:#e8e4d9;font-size:11px;letter-spacing:1px}
.pin-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.room-badge{color:#787468;font-size:10px;letter-spacing:1px;border-left:1px solid #333;padding-left:8px}
.timer-badge{font-size:10px;color:#787468;letter-spacing:1px}
#timer-txt{color:#b8b4a9}
.tb-btn{
  background:transparent;border:1px solid #444;color:#e8e4d9;
  font-family:'Courier New',monospace;
  font-size:11px;padding:5px 10px;cursor:pointer;white-space:nowrap;
}
.tb-btn:hover{border-color:#e8e4d9}
#sync-btn{margin-left:auto}

#board-wrap{flex:1;overflow:hidden;position:relative;background:#080808;touch-action:none}
#board{position:absolute;transform-origin:0 0;will-change:transform}

#string-svg{
  position:absolute;top:0;left:0;width:680px;height:1980px;
  pointer-events:none;z-index:5;overflow:visible;
}

#memo-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20}

.memo-card{position:absolute;pointer-events:auto;user-select:none;touch-action:none}
.memo-pin{
  position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  width:18px;height:18px;border-radius:50%;
  box-shadow:0 2px 5px rgba(0,0,0,0.7);z-index:2;
}
.memo-paper{
  background:rgba(242,238,224,0.92);padding:10px 10px 20px;position:relative;
  font-family:'Courier New',monospace;font-size:11px;line-height:1.7;color:#1a1814;
  word-break:break-all;white-space:pre-wrap;box-shadow:2px 3px 10px rgba(0,0,0,0.5);
}
.memo-author{position:absolute;bottom:4px;right:7px;font-size:8px;color:#888;letter-spacing:1px}
.memo-del{
  position:absolute;top:3px;right:4px;
  background:none;border:none;color:#aaa;font-size:13px;
  cursor:pointer;line-height:1;padding:0 2px;display:none;
}
.memo-card:hover .memo-del{display:block}
.memo-edit-area{
  width:100%;background:transparent;border:none;outline:none;
  font-family:'Courier New',monospace;font-size:11px;line-height:1.7;color:#1a1814;
  resize:none;min-height:40px;
}

#compose{
  position:fixed;bottom:0;left:0;width:100%;
  background:rgba(8,8,8,0.97);border-top:1px solid #333;
  padding:14px 18px;z-index:500;display:none;
}
#compose h3{color:#e8e4d9;font-size:10px;letter-spacing:2px;margin-bottom:8px}
#compose textarea{
  width:100%;background:rgba(242,238,224,0.06);border:1px solid #444;
  color:#e8e4d9;font-family:'Courier New',monospace;
  font-size:13px;padding:10px;resize:none;height:80px;outline:none;line-height:1.6;
}
.c-actions{display:flex;gap:8px;margin-top:8px}
.c-actions button{
  background:transparent;border:1px solid #555;color:#e8e4d9;
  font-family:'Courier New',monospace;font-size:11px;padding:7px 14px;cursor:pointer;
}
.c-actions button:hover{border-color:#e8e4d9}

#toast{
  position:fixed;top:52px;left:50%;transform:translateX(-50%);
  background:#1a1a1a;border:1px solid #555;color:#e8e4d9;
  font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;
  padding:7px 18px;z-index:600;opacity:0;transition:opacity 0.3s;
  pointer-events:none;white-space:nowrap;
}

#config-banner{
  position:fixed;top:0;left:0;width:100%;background:#c0392b;color:#fff;
  font-size:11px;text-align:center;padding:6px;z-index:3000;letter-spacing:1px;display:none;
}
</style>

<div id="app">

<div id="config-banner">
  ⚠ Supabase 미설정 — 공유 기능이 작동하지 않습니다. HTML 파일에서 SUPABASE_URL과 SUPABASE_KEY를 설정해주세요.
</div>

<div id="setup">

    <h2>수사 보드</h2>

    </div>
    <p class="room-hint">· 같은 코드로 입장한 사람끼리 공유 · 3시간 후 자동 삭제</p>
    <label>닉네임</label>
    <input id="nick-input" type="text" placeholder="이름을 입력하세요" maxlength="10" autocomplete="off">
    <label>핀 색상 선택</label>
    <div class="pin-grid" id="pin-grid"></div>
    <p class="setup-err" id="setup-err"></p>
    <button class="btn-enter" id="enter-btn">입장 →</button>
  </div>
</div>

<div id="toolbar">
  <div class="user-badge">
    <div class="pin-dot" id="tb-pin"></div>
    <span id="tb-name"></span>
  </div>
  <div class="room-badge" id="tb-room"></div>
  <div class="timer-badge">⏱ <span id="timer-txt">3:00:00</span></div>
  <button class="tb-btn" id="add-btn">+ 메모</button>

  <button class="tb-btn" id="zoom-out-btn">－</button>
  <button class="tb-btn" id="reset-btn">⊙</button>
  <button class="tb-btn" id="shot-btn">📷</button>
  <button class="tb-btn" id="sync-btn">↻ 전체 공개</button>
</div>

<script>
const SUPABASE_URL = 'https://ildruorzfczzsxfszizs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsZHJ1b3J6ZmN6enN4ZnN6aXpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTk0NTcsImV4cCI6MjA5NzkzNTQ1N30.dYB4qH6_kFjEnu1KWPNAuMIG6wQEwJ1LtJ21oNKoViI';

const CONFIGURED = SUPABASE_URL !== 'YOUR_SUPABASE_URL';
if (!CONFIGURED) document.getElementById('config-banner').style.display = 'block';

const PIN_COLORS  = ['#c0392b','#2980b9','#27ae60','#e67e22','#8e44ad','#e91e8c'];
const SVG_W       = 680;
const SVG_H       = 1980;
const THREE_HOURS = 3 * 60 * 60 * 1000;
const MEMO_W      = 140;
const MEMO_H      = 105;

let user         = null;
let roomCode     = '';
let timerStarted = false;
let scale = 1, panX = 0, panY = 0;
let memoMap   = {};   // id → { m, el }
let memoOrder = 0;
const ownMemoIds = new Set();  // 이 세션에서 직접 작성한 메모 ID

const boardWrap = document.getElementById('board-wrap');
const board     = document.getElementById('board');
const stringSvg = document.getElementById('string-svg');
const memoLayer = document.getElementById('memo-layer');

// ── Supabase API ──
const SB = {
  headers: {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  },
  async read(room) {
    const r = await fetch(
      `${SUPABASE_URL}/rest/v1/memos?room=eq.${encodeURIComponent(room)}&order=ts.asc&select=*`,
      { headers: { ...SB.headers, 'Prefer': '' } }
    );
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async insert(memo) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/memos`, {
      method: 'POST', headers: SB.headers, body: JSON.stringify(memo)
    });
    if (!r.ok) throw new Error(await r.text());
  },
  async update(id, fields) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/memos?id=eq.${encodeURIComponent(id)}`, {
      method: 'PATCH', headers: SB.headers, body: JSON.stringify(fields)
    });
    if (!r.ok) throw new Error(await r.text());
  },
  async remove(id) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/memos?id=eq.${encodeURIComponent(id)}`, {
      method: 'DELETE', headers: SB.headers
    });
    if (!r.ok) throw new Error(await r.text());
  }
};

// ── Transform ──
function applyTransform() {
  board.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
}
function fitBoard() {
  const ww = boardWrap.clientWidth, wh = boardWrap.clientHeight;
  scale = Math.min(ww / SVG_W, wh / SVG_H) * 0.95;
  panX  = (ww - SVG_W * scale) / 2;
  panY  = 10;
  applyTransform();
}
function svgToScreen(svgX, svgY) {
  return { x: svgX * scale + panX, y: svgY * scale + panY };
}
function screenToSvg(sx, sy) {
  return { x: (sx - panX) / scale, y: (sy - panY) / scale };
}
function repositionMemos() {
  Object.values(memoMap).forEach(({ m, el }) => {
    const sc = svgToScreen(m.svgX, m.svgY);
    el.style.left = (sc.x - MEMO_W / 2) + 'px';
    el.style.top  = (sc.y - MEMO_H / 2) + 'px';
  });
  updateStrings();
}

// ── Pan & Pinch ──
let isPanning = false, panStart = {x:0,y:0}, panBase = {x:0,y:0}, pinch = null;

boardWrap.addEventListener('mousedown', e => {
  if (e.target.closest('.memo-card')) return;
  isPanning = true;
  panStart  = { x: e.clientX, y: e.clientY };
  panBase   = { x: panX, y: panY };
  boardWrap.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = panBase.x + e.clientX - panStart.x;
  panY = panBase.y + e.clientY - panStart.y;
  applyTransform(); repositionMemos();
});
window.addEventListener('mouseup', () => { isPanning = false; boardWrap.style.cursor = ''; });

boardWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.1 : 0.9;
  const r = boardWrap.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  scale = Math.max(0.15, Math.min(6, scale * f));
  panX  = mx - (mx - panX) * f;
  panY  = my - (my - panY) * f;
  applyTransform(); repositionMemos();
}, { passive: false });

boardWrap.addEventListener('touchstart', e => {
  const onMemo = Array.from(e.touches).some(t =>
    document.elementFromPoint(t.clientX, t.clientY)?.closest('.memo-card')
  );
  if (onMemo) return;
  const ts = Array.from(e.touches);
  if (ts.length === 1) {
    isPanning = true;
    panStart  = { x: ts[0].clientX, y: ts[0].clientY };
    panBase   = { x: panX, y: panY };
    pinch     = null;
  } else if (ts.length === 2) {
    isPanning = false;
    const r   = boardWrap.getBoundingClientRect();
    const mx0 = (ts[0].clientX + ts[1].clientX) / 2 - r.left;
    const my0 = (ts[0].clientY + ts[1].clientY) / 2 - r.top;
    pinch = {
      dist0: Math.hypot(ts[0].clientX - ts[1].clientX, ts[0].clientY - ts[1].clientY),
      scale0: scale, panX0: panX, panY0: panY, midX0: mx0, midY0: my0
    };
  }
  e.preventDefault();
}, { passive: false });

boardWrap.addEventListener('touchmove', e => {
  const onMemo = Array.from(e.touches).some(t =>
    document.elementFromPoint(t.clientX, t.clientY)?.closest('.memo-card')
  );
  if (onMemo) return;
  const ts = Array.from(e.touches);
  if (ts.length === 1 && isPanning && !pinch) {
    panX = panBase.x + ts[0].clientX - panStart.x;
    panY = panBase.y + ts[0].clientY - panStart.y;
    applyTransform(); repositionMemos();
  } else if (ts.length === 2 && pinch) {
    const r    = boardWrap.getBoundingClientRect();
    const dist = Math.hypot(ts[0].clientX - ts[1].clientX, ts[0].clientY - ts[1].clientY);
    const mx   = (ts[0].clientX + ts[1].clientX) / 2 - r.left;
    const my   = (ts[0].clientY + ts[1].clientY) / 2 - r.top;
    const ns   = Math.max(0.15, Math.min(6, pinch.scale0 * dist / pinch.dist0));
    panX  = pinch.panX0 + mx - pinch.midX0 - (pinch.midX0 - pinch.panX0) * (ns / pinch.scale0 - 1);
    panY  = pinch.panY0 + my - pinch.midY0 - (pinch.midY0 - pinch.panY0) * (ns / pinch.scale0 - 1);
    scale = ns;
    applyTransform(); repositionMemos();
  }
  e.preventDefault();
}, { passive: false });

boardWrap.addEventListener('touchend', e => {
  if (e.touches.length === 0) { isPanning = false; pinch = null; }
  else if (e.touches.length === 1) { pinch = null; }
}, { passive: true });

function zoomAt(f) {
  const cx = boardWrap.clientWidth / 2, cy = boardWrap.clientHeight / 2;
  scale = Math.max(0.15, Math.min(6, scale * f));
  panX  = cx - (cx - panX) * f;
  panY  = cy - (cy - panY) * f;
  applyTransform(); repositionMemos();
}
document.getElementById('zoom-in-btn').onclick  = () => zoomAt(1.25);
document.getElementById('zoom-out-btn').onclick = () => zoomAt(0.8);
document.getElementById('reset-btn').onclick    = () => { fitBoard(); repositionMemos(); };

// ── 실 연결 ──
function updateStrings() {
  const byAuthor = {};
  Object.values(memoMap).forEach(({ m }) => {
    if (!byAuthor[m.author]) byAuthor[m.author] = [];
    byAuthor[m.author].push(m);
  });
  let html = '';
  Object.values(byAuthor).forEach(pts => {
    if (pts.length < 2) return;
    pts.sort((a, b) => a.ts < b.ts ? -1 : 1);
    for (let i = 0; i < pts.length - 1; i++) {
      const a = pts[i], b = pts[i+1];
      const mx = (a.svgX + b.svgX) / 2, my = (a.svgY + b.svgY) / 2 + 30;
      const sw = Math.max(0.4, 1.5 / scale).toFixed(2);
      html += `<path d="M${a.svgX},${a.svgY} Q${mx},${my} ${b.svgX},${b.svgY}" fill="none" stroke="${a.color}" stroke-width="${sw}" opacity="0.6"/>`;
    }
  });
  stringSvg.innerHTML = html;
}

// ── 메모 생성 ──
function makeMemo(m) {
  if (memoMap[m.id]) return;
  const sc    = svgToScreen(m.svgX, m.svgY);
  const el    = document.createElement('div');
  const isOwn = ownMemoIds.has(m.id);
  el.className  = 'memo-card';
  el.dataset.id = m.id;
  el.style.cssText = `width:${MEMO_W}px;left:${sc.x-MEMO_W/2}px;top:${sc.y-MEMO_H/2}px;transform:rotate(${m.angle}deg);z-index:${20+(memoOrder%30)};`;
  el.innerHTML = `
    <div class="memo-pin" style="background:${m.color}"></div>
    <div class="memo-paper" style="min-height:${MEMO_H*0.75}px">
      ${isOwn ? '<button class="memo-del">×</button>' : ''}
      <div class="memo-text">${escHtml(m.text)}</div>
      <div class="memo-author">${escHtml(m.author)}</div>
    </div>`;
  if (isOwn) {
    el.querySelector('.memo-del').addEventListener('click', ev => { ev.stopPropagation(); deleteMemo(m.id); });
    el.addEventListener('dblclick', () => startEdit(el, m));
  }
  makeDraggable(el, m, isOwn);
  memoLayer.appendChild(el);
  memoMap[m.id] = { m, el };
  memoOrder++;
  updateStrings();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── 드래그 ──
function makeDraggable(el, m, isOwn) {
  let startCX, startCY, startSX, startSY, moved;

  function onStart(cx, cy) {
    const sc = svgToScreen(m.svgX, m.svgY);
    startCX = cx; startCY = cy;
    startSX = sc.x; startSY = sc.y;
    moved   = false;
    el.style.zIndex = 200;
  }
  function onMove(cx, cy) {
    const dx = cx - startCX, dy = cy - startCY;
    if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
    const newSX = startSX + dx, newSY = startSY + dy;
    el.style.left = (newSX - MEMO_W/2) + 'px';
    el.style.top  = (newSY - MEMO_H/2) + 'px';
    const sv = screenToSvg(newSX, newSY);
    m.svgX = sv.x; m.svgY = sv.y;
    updateStrings();
  }
  function onEnd() {
    el.style.zIndex = 20 + (memoOrder % 30);
    if (moved && isOwn && CONFIGURED) {
      SB.update(m.id, { svgX: +m.svgX.toFixed(2), svgY: +m.svgY.toFixed(2) }).catch(() => {});
    }
  }

  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('memo-del')) return;
    e.preventDefault(); e.stopPropagation();
    onStart(e.clientX, e.clientY);
    const mm = ev => onMove(ev.clientX, ev.clientY);
    const mu = () => { onEnd(); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', mu);
  });

  el.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    e.stopPropagation();
    onStart(e.touches[0].clientX, e.touches[0].clientY);
    const tm = ev => { ev.preventDefault(); ev.stopPropagation(); onMove(ev.touches[0].clientX, ev.touches[0].clientY); };
    const te = () => { onEnd(); el.removeEventListener('touchmove', tm); el.removeEventListener('touchend', te); };
    el.addEventListener('touchmove', tm, { passive: false });
    el.addEventListener('touchend',  te, { passive: true });
  }, { passive: true });

  // 모바일 더블탭 수정
  if (isOwn) {
    let lastTap = 0;
    el.addEventListener('touchend', e => {
      if (e.changedTouches.length !== 1) return;
      const now = Date.now();
      if (now - lastTap < 350) startEdit(el, m);
      lastTap = now;
    }, { passive: true });
  }
}

// ── 수정 / 삭제 ──
function startEdit(el, m) {
  const textEl = el.querySelector('.memo-text');
  if (textEl.querySelector('textarea')) return;
  const orig = m.text;
  textEl.innerHTML = '';
  const ta = document.createElement('textarea');
  ta.className = 'memo-edit-area';
  ta.value = orig;
  textEl.appendChild(ta);
  ta.focus();
  ta.addEventListener('blur', () => {
    const newText = ta.value.trim() || orig;
    m.text = newText;
    textEl.innerHTML = escHtml(newText);
    if (CONFIGURED) SB.update(m.id, { text: newText }).catch(() => {});
  });
}

async function deleteMemo(id) {
  if (!confirm('이 메모를 삭제할까요?')) return;
  const entry = memoMap[id];
  if (entry) { entry.el.remove(); delete memoMap[id]; }
  ownMemoIds.delete(id);
  updateStrings();
  if (CONFIGURED) SB.remove(id).catch(() => {});
}

// ── 헬퍼 ──
function randAngle() {
  return +(Math.random() * 30 - 15).toFixed(2);
}
function randCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({ length: 5 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}
const FLOORS = [
  {top:68,bot:148},{top:148,bot:288},{top:338,bot:468},{top:468,bot:618},
  {top:618,bot:868},{top:868,bot:1048},{top:1048,bot:1248},{top:1248,bot:1328},{top:1328,bot:1510}
];
function randPos(idx) {
  const f = FLOORS[idx % FLOORS.length];
  return { svgX: 90 + Math.random() * 500, svgY: f.top + (f.bot-f.top)*0.15 + Math.random()*(f.bot-f.top)*0.7 };
}

// ── 토스트 ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 2500);
}

// ── 타이머 ──
function startTimer(createdAt) {
  if (timerStarted) return;
  timerStarted = true;
  const timerEl = document.getElementById('timer-txt');
  function tick() {
    const left = THREE_HOURS - (Date.now() - createdAt);
    if (left <= 0) { timerEl.textContent = '만료됨'; timerEl.style.color = '#c0392b'; return; }
    const h = Math.floor(left / 3600000);
    const m = Math.floor((left % 3600000) / 60000);
    const s = Math.floor((left % 60000) / 1000);
    timerEl.textContent = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    timerEl.style.color = left < 300000 ? '#c0392b' : left < 600000 ? '#e67e22' : '#b8b4a9';
    setTimeout(tick, 1000);
  }
  tick();
}

// ── 동기화 (삭제 반영 + 위치/텍스트 업데이트 포함) ──
async function syncAll() {
  if (!CONFIGURED) { toast('Supabase 미설정 — 공유 불가'); return; }
  try {
    const rows  = await SB.read(roomCode);
    const dbIds = new Set(rows.map(r => String(r.id)));

    // DB에서 지워진 남의 메모를 로컬에서도 제거
    Object.keys(memoMap).forEach(id => {
      if (!dbIds.has(id) && !ownMemoIds.has(id)) {
        memoMap[id].el.remove();
        delete memoMap[id];
      }
    });

    let added = 0;
    rows.forEach(row => {
      const m = {
        id: String(row.id), room: row.room, author: row.author,
        color: row.color, text: row.text,
        angle: parseFloat(row.angle) || 0,
        svgX:  parseFloat(row.svgX)  || 340,
        svgY:  parseFloat(row.svgY)  || 700,
        ts:    row.ts
      };
      if (!timerStarted && row.ts) startTimer(new Date(row.ts).getTime());
      if (!memoMap[m.id]) {
        makeMemo(m); added++;
      } else {
        // 다른 사람이 이동하거나 수정한 내용 반영
        const entry = memoMap[m.id];
        entry.m.svgX = m.svgX; entry.m.svgY = m.svgY; entry.m.text = m.text;
        const sc = svgToScreen(m.svgX, m.svgY);
        entry.el.style.left = (sc.x - MEMO_W/2) + 'px';
        entry.el.style.top  = (sc.y - MEMO_H/2) + 'px';
        const textEl = entry.el.querySelector('.memo-text');
        if (textEl && !textEl.querySelector('textarea')) textEl.innerHTML = escHtml(m.text);
      }
    });
    updateStrings();
    toast(added > 0 ? `${added}개의 새 메모가 공개됐어요!` : '동기화 완료');
  } catch (e) {
    toast('동기화 실패 — 인터넷 연결을 확인해주세요');
  }
}

// ── 스크린샷 (SVG 직렬화, 외부 라이브러리 불필요) ──
document.getElementById('shot-btn').onclick = async () => {
  toast('캡처 중...');
  try {
    const ns  = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('xmlns', ns);
    svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
    svg.setAttribute('width',  String(SVG_W * 2));
    svg.setAttribute('height', String(SVG_H * 2));

    // 호텔 맵
    Array.from(document.getElementById('hotel-svg').childNodes)
      .forEach(n => svg.appendChild(n.cloneNode(true)));
    // 실 연결
    Array.from(stringSvg.childNodes)
      .forEach(n => svg.appendChild(n.cloneNode(true)));
    // 메모 카드
    Object.values(memoMap).forEach(({ m }) => {
      const g = document.createElementNS(ns, 'g');
      g.setAttribute('transform', `translate(${m.svgX},${m.svgY}) rotate(${m.angle})`);
      const rect = document.createElementNS(ns, 'rect');
      rect.setAttribute('x','-35'); rect.setAttribute('y','-26');
      rect.setAttribute('width','70'); rect.setAttribute('height','52');
      rect.setAttribute('fill','rgba(242,238,224,0.92)');
      g.appendChild(rect);
      const pin = document.createElementNS(ns, 'circle');
      pin.setAttribute('cx','0'); pin.setAttribute('cy','-30');
      pin.setAttribute('r','4'); pin.setAttribute('fill', m.color);
      g.appendChild(pin);
      m.text.split('\n').slice(0, 5).forEach((line, i) => {
        const t = document.createElementNS(ns, 'text');
        t.setAttribute('x','-30'); t.setAttribute('y', String(-14 + i * 9));
        t.setAttribute('font-size','7'); t.setAttribute('fill','#1a1814');
        t.setAttribute('font-family','monospace');
        t.textContent = line.slice(0, 20);
        g.appendChild(t);
      });
      const auth = document.createElementNS(ns, 'text');
      auth.setAttribute('x','32'); auth.setAttribute('y','22');
      auth.setAttribute('font-size','5'); auth.setAttribute('fill','#888');
      auth.setAttribute('text-anchor','end'); auth.setAttribute('font-family','monospace');
      auth.textContent = m.author;
      g.appendChild(auth);
      svg.appendChild(g);
    });

    const svgStr = new XMLSerializer().serializeToString(svg);
    const blob   = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url    = URL.createObjectURL(blob);

    await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = SVG_W * 2; canvas.height = SVG_H * 2;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#080808';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        const a = document.createElement('a');
        a.href     = canvas.toDataURL('image/png');
        a.download = `SNM_${roomCode}_${new Date().toISOString().slice(0,10)}.png`;
        a.click();
        resolve();
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(); };
      img.src = url;
    });
    toast('저장 완료!');
  } catch (e) {
    toast('캡처 실패');
  }
};

// ── 셋업 ──
document.addEventListener('DOMContentLoaded', () => {
  // URL 파라미터로 방 코드 자동 입력 (?room=XXXXX)
  const urlRoom = new URLSearchParams(location.search).get('room');
  if (urlRoom) document.getElementById('room-input').value = urlRoom.toUpperCase().slice(0, 5);

  // 핀 색상 그리드
  const grid = document.getElementById('pin-grid');
  let selectedPin = 0;
  PIN_COLORS.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'pin-opt' + (i === 0 ? ' selected' : '');
    d.style.background = c;
    d.onclick = () => {
      document.querySelectorAll('.pin-opt').forEach(x => x.classList.remove('selected'));
      d.classList.add('selected');
      selectedPin = i;
    };
    grid.appendChild(d);
  });

  document.getElementById('room-gen-btn').onclick = () => {
    document.getElementById('room-input').value = randCode();
  };
  document.getElementById('room-input').addEventListener('input', e => {
    e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  });

  document.getElementById('enter-btn').onclick = async () => {
    const errEl = document.getElementById('setup-err');
    const room  = document.getElementById('room-input').value.trim().toUpperCase();
    const nick  = document.getElementById('nick-input').value.trim();
    errEl.textContent = '';
    if (!room) { errEl.textContent = '방 코드를 입력하세요'; return; }
    if (!nick) { errEl.textContent = '닉네임을 입력하세요'; return; }

    roomCode = room;
    user     = { nick, color: PIN_COLORS[selectedPin] };

    document.getElementById('setup').style.display      = 'none';
    document.getElementById('toolbar').style.display    = 'flex';
    document.getElementById('tb-pin').style.background  = user.color;
    document.getElementById('tb-name').textContent      = user.nick;
    document.getElementById('tb-room').textContent      = `# ${roomCode}`;
    document.getElementById('compose-user').textContent = user.nick;

    fitBoard();
    await syncAll();
    if (!timerStarted) startTimer(Date.now());
  };

  document.getElementById('add-btn').onclick = () => {
    document.getElementById('compose').style.display = 'block';
    document.getElementById('compose-text').focus();
  };
  document.getElementById('c-cancel').onclick = () => {
    document.getElementById('compose').style.display = 'none';
    document.getElementById('compose-text').value    = '';
  };
  document.getElementById('c-submit').onclick = async () => {
    const text = document.getElementById('compose-text').value.trim();
    if (!text) return;
    const pos = randPos(Object.keys(memoMap).length);
    const id  = (crypto.randomUUID?.() ?? (Date.now().toString(36) + Math.random().toString(36).slice(2)));
    const m   = {
      id, room: roomCode, author: user.nick, color: user.color, text,
      angle: randAngle(),
      svgX:  +pos.svgX.toFixed(2),
      svgY:  +pos.svgY.toFixed(2),
      ts:    new Date().toISOString()
    };
    ownMemoIds.add(id);
    makeMemo(m);
    document.getElementById('compose').style.display = 'none';
    document.getElementById('compose-text').value    = '';
    if (!timerStarted) startTimer(Date.now());
    if (CONFIGURED) {
      try {
        await SB.insert(m);
        toast('메모가 보드에 꽂혔어요!');
      } catch (e) {
        toast('저장 실패 — 나중에 동기화해주세요');
      }
    } else {
      toast('메모 추가됨 (공유 미설정)');
    }
  };

  document.getElementById('sync-btn').onclick = syncAll;
});
</script>
